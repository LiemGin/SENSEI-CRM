<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hồ Sơ Giáo Viên — Sensei Nihongo</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --red:#C8102E; --red-dark:#9e0b22; --red-light:#fdecea; --red-mid:#f5c0c7;
  --ink:#1a1a1a; --ink2:#444; --ink3:#888; --border:#e8e4e0;
  --bg:#f5f4f2; --white:#fff;
  --gold:#d4a017; --green:#1a7a4a; --green-bg:#edf7f2; --green-b:#b2ddc7;
  --blue:#1a5fa8; --orange:#d45f00; --orange-bg:#fff4eb;
  --purple:#6b3fa0; --gray:#f0eeeb;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Be Vietnam Pro',sans-serif; background:var(--bg); color:var(--ink); }

/* ── LOADING / ERROR ── */
#loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:14px; background:var(--bg); }
.spinner { width:36px; height:36px; border:3px solid var(--red-mid); border-top-color:var(--red); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loading p { font-size:13px; color:var(--ink3); }
#error { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:10px; padding:24px; text-align:center; }
#error h3 { font-size:16px; font-weight:600; }
#error p { font-size:13px; color:var(--ink3); }
#card { display:none; padding-bottom:40px; animation:fadeUp .4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* ── HEADER ── */
.hdr {
  background:var(--red);
  padding:20px 16px 64px;
  position:relative; overflow:hidden;
}
.hdr::before {
  content:'師'; position:absolute; right:-8px; top:-15px;
  font-size:120px; color:rgba(255,255,255,.06); font-weight:800; pointer-events:none;
}
.hdr-row1 { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
.gv-name { font-size:20px; font-weight:800; color:#fff; line-height:1.25; flex:1; }

/* rank badge — nổi bật hơn */
.rank-badge {
  display:inline-flex; align-items:center; gap:5px;
  padding:6px 14px; border-radius:24px;
  font-size:12px; font-weight:700; color:#fff;
  white-space:nowrap; flex-shrink:0;
  border:2px solid rgba(255,255,255,.6);
  backdrop-filter:blur(6px);
}
.r-elite  { background:var(--gold);    border-color:var(--gold);    box-shadow:0 2px 10px rgba(212,160,23,.5); }
.r-pro    { background:#3a82d4;        border-color:#3a82d4;        box-shadow:0 2px 10px rgba(58,130,212,.5); }
.r-sensei { background:var(--green);   border-color:var(--green);   box-shadow:0 2px 10px rgba(26,122,74,.5); }
.r-warn   { background:var(--orange);  border-color:var(--orange); }
.r-alert  { background:#777;           border-color:#777; }

.hdr-row2 { display:flex; gap:14px; flex-wrap:wrap; }
.hdr-row2 span { font-size:12px; color:rgba(255,255,255,.85); display:flex; align-items:center; gap:4px; }

/* ── AVATAR CARD (float over header) ── */
.profile-card {
  margin:-44px 16px 0;
  background:var(--white);
  border-radius:16px;
  padding:16px;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
  display:flex; align-items:center; gap:14px;
  border:1px solid var(--border);
  position:relative; z-index:2;
}
.av {
  width:60px; height:60px; border-radius:50%;
  background:var(--red-light); border:3px solid var(--red-mid);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; font-weight:800; color:var(--red); flex-shrink:0;
}
.av-details { flex:1; min-width:0; }
.av-name { font-size:15px; font-weight:700; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.av-sub  { font-size:12px; color:var(--ink3); margin-top:2px; }
.av-chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.chip { background:var(--gray); border-radius:20px; padding:3px 10px; font-size:11px; font-weight:600; color:var(--ink2); }

/* ── QUICK STATS ── */
.q-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:12px 16px; }
.q-stat { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:12px 6px; text-align:center; }
.q-val { font-size:19px; font-weight:800; color:var(--red); line-height:1; }
.q-lbl { font-size:10px; color:var(--ink3); margin-top:3px; font-weight:500; line-height:1.3; }

/* ── TABS — pill style ── */
.tabs-wrap { padding:0 16px 12px; }
.tabs {
  display:flex; background:var(--gray);
  border-radius:14px; padding:4px; gap:3px;
}
.tab-btn {
  flex:1; padding:10px 4px;
  font-size:12px; font-weight:600;
  color:var(--ink3); background:transparent;
  border:none; cursor:pointer;
  border-radius:11px;
  font-family:'Be Vietnam Pro',sans-serif;
  transition:all .2s;
  display:flex; align-items:center; justify-content:center;
  gap:4px; white-space:nowrap;
}
.tab-btn.active {
  background:var(--white);
  color:var(--red);
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  font-weight:700;
}
.tab-content { display:none; padding:0 16px; animation:fadeUp .25s ease both; }
.tab-content.active { display:block; }

/* ── SECTIONS ── */
.sec { margin-bottom:18px; }
.sec-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--ink3);
  margin-bottom:10px; display:flex; align-items:center; gap:6px;
}
.sec-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── SCORE RING ── */
.score-block {
  display:flex; align-items:center; gap:14px;
  background:var(--white); border:1px solid var(--border);
  border-radius:14px; padding:16px; margin-bottom:14px;
}
.ring-wrap { position:relative; flex-shrink:0; }
.ring-svg { transform:rotate(-90deg); display:block; }
.ring-bg   { fill:none; stroke:var(--gray); stroke-width:7; }
.ring-fill { fill:none; stroke-width:7; stroke-linecap:round; transition:stroke-dashoffset 1s ease; }
.ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ring-num { font-size:22px; font-weight:800; line-height:1; }
.ring-sub { font-size:9px; color:var(--ink3); }
.score-info { flex:1; }
.score-ttl  { font-size:13px; font-weight:700; margin-bottom:2px; }
.score-rank { font-size:12px; color:var(--ink3); margin-bottom:10px; }
.bars { display:flex; flex-direction:column; gap:6px; }
.br  { display:flex; align-items:center; gap:6px; }
.bl  { font-size:10px; color:var(--ink3); width:76px; flex-shrink:0; }
.bt  { flex:1; height:5px; background:var(--gray); border-radius:3px; overflow:hidden; }
.bf  { height:100%; border-radius:3px; }
.bv  { font-size:10px; font-weight:600; color:var(--ink2); width:28px; text-align:right; flex-shrink:0; }

/* ── CRITERIA TABLE ── */
.crit-tbl { width:100%; border-collapse:collapse; background:var(--white); border-radius:12px; overflow:hidden; border:1px solid var(--border); margin-bottom:14px; }
.crit-tbl th { font-size:10px; font-weight:700; color:var(--ink3); text-transform:uppercase; padding:9px 12px; background:var(--gray); }
.crit-tbl th:last-child, .crit-tbl td:last-child { text-align:right; }
.crit-tbl td { font-size:13px; padding:9px 12px; border-top:1px solid var(--border); color:var(--ink2); }
.crit-tbl tr.ttl td { font-weight:700; color:var(--red); background:var(--red-light); font-size:14px; }
.cv { font-weight:700; color:var(--red); }

/* ── INFO GRID ── */
.ig { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.ii { background:var(--white); border:1px solid var(--border); border-radius:10px; padding:10px 12px; }
.il { font-size:10px; font-weight:600; color:var(--ink3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:3px; }
.iv { font-size:13px; font-weight:500; color:var(--ink); }

/* ── MINI HISTORY BARS ── */
.mini-hist {
  background:var(--white); border:1px solid var(--border);
  border-radius:12px; padding:14px; margin-bottom:14px;
}
.mh-bars { display:flex; gap:10px; align-items:flex-end; }
.mh-col  { display:flex; flex-direction:column; align-items:center; gap:5px; flex:1; }
.mh-val  { font-size:11px; font-weight:700; }
.mh-bar-wrap { width:100%; height:56px; background:var(--gray); border-radius:8px; overflow:hidden; display:flex; align-items:flex-end; }
.mh-bar { width:100%; border-radius:8px; transition:height .8s ease; }
.mh-lbl { font-size:10px; color:var(--ink3); }

/* ── CLASSES ── */
.cls-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
.cls-top  { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
.cls-name { font-size:13px; font-weight:700; }
.cls-lv   { font-size:10px; font-weight:700; padding:3px 9px; border-radius:10px; background:var(--red-light); color:var(--red); border:1px solid var(--red-mid); }
.cls-meta { display:flex; gap:10px; font-size:11px; color:var(--ink3); margin-bottom:8px; flex-wrap:wrap; align-items:center; }
.att-pill { font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
.ap-g { background:var(--green-bg); color:var(--green); }
.ap-w { background:var(--orange-bg); color:var(--orange); }
.ap-r { background:var(--red-light); color:var(--red); }
.prog-row { display:flex; align-items:center; gap:8px; }
.prog-track { flex:1; height:5px; background:var(--gray); border-radius:3px; overflow:hidden; }
.prog-fill  { height:100%; background:var(--red); border-radius:3px; }
.prog-lbl   { font-size:10px; color:var(--ink3); white-space:nowrap; }

/* ── AI BLOCK ── */
.ai-wrap { background:linear-gradient(135deg,#12122a,#1a1a3e); border-radius:14px; padding:14px; margin-bottom:14px; }
.ai-hdr  { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.ai-ico  { width:30px; height:30px; border-radius:8px; background:rgba(255,255,255,.1); display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
.ai-ttl  { font-size:13px; font-weight:700; color:#fff; }
.ai-sub  { font-size:11px; color:rgba(255,255,255,.5); }
.ai-item { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:10px 12px; margin-bottom:8px; }
.ai-item:last-child { margin-bottom:0; }
.ai-ih   { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.ai-iico { font-size:14px; flex-shrink:0; }
.ai-ittl { font-size:12px; font-weight:700; color:#fff; }
.ai-body { font-size:11px; color:rgba(255,255,255,.72); line-height:1.55; margin-bottom:6px; }
.ai-tag  { display:inline-block; font-size:10px; font-weight:700; padding:2px 9px; border-radius:10px; }
.t-r  { background:rgba(200,16,46,.3);  color:#ff8096; }
.t-g  { background:rgba(26,122,74,.3);  color:#5de0a0; }
.t-b  { background:rgba(26,95,168,.3);  color:#7ab8f5; }
.t-o  { background:rgba(212,160,23,.25);color:#f5c842; }

/* ── THÀNH TÍCH ── */
.ach-item { display:flex; align-items:center; gap:12px; background:var(--white); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
.ach-ico  { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.ach-ttl  { font-size:13px; font-weight:700; color:var(--ink); }
.ach-sub  { font-size:11px; color:var(--ink3); margin-top:2px; }

/* ── HISTORY CARDS ── */
.hist-card { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
.hist-top  { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.hist-month{ font-size:13px; font-weight:700; }
.hist-score{ font-size:20px; font-weight:800; color:var(--red); line-height:1; }
.hist-rank { font-size:10px; font-weight:600; margin-top:2px; text-align:right; }
.trend-up  { font-size:11px; font-weight:600; color:var(--green); }
.trend-dn  { font-size:11px; font-weight:600; color:var(--red); }
.trend-eq  { font-size:11px; font-weight:600; color:var(--ink3); }
.hb { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.hl { font-size:10px; color:var(--ink3); width:58px; flex-shrink:0; }
.ht { flex:1; height:4px; background:var(--gray); border-radius:2px; overflow:hidden; }
.hf { height:100%; border-radius:2px; }
.hv { font-size:10px; color:var(--ink2); width:28px; text-align:right; flex-shrink:0; }

/* ── SALARY ── */
.sal-box { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:14px; }
.sal-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; }
.sal-row + .sal-row { border-top:1px solid var(--border); }
.sal-lbl { font-size:12px; color:var(--ink3); }
.sal-val { font-size:13px; font-weight:600; color:var(--ink); }
.sal-total { font-size:18px; font-weight:800; color:var(--green); }

/* ── ACTIONS ── */
.actions { display:flex; gap:8px; padding:0 16px; margin-top:6px; flex-wrap:wrap; }
.btn { flex:1; min-width:90px; padding:11px 12px; border-radius:12px; font-size:13px; font-weight:600; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; font-family:'Be Vietnam Pro',sans-serif; transition:all .15s; }
.btn-p { background:var(--red); color:#fff; }
.btn-p:hover { background:var(--red-dark); }
.btn-s { background:var(--white); color:var(--ink2); border:1px solid var(--border); }
.btn-s:hover { background:var(--gray); }

/* ── ID BAR ── */
.id-bar { display:flex; align-items:center; justify-content:space-between; padding:8px 16px; background:var(--gray); border-top:1px solid var(--border); margin-top:8px; }
.id-bar span { font-size:10px; color:var(--ink3); font-family:monospace; }
.cp-btn { font-size:10px; color:var(--ink3); background:none; border:1px solid var(--border); border-radius:4px; padding:2px 8px; cursor:pointer; font-family:'Be Vietnam Pro',sans-serif; }
.cp-btn:hover { color:var(--red); border-color:var(--red-mid); }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Đang tải hồ sơ giáo viên...</p></div>
<div id="error"><div style="font-size:40px">⚠️</div><h3>Không tìm thấy giáo viên</h3><p id="err-msg"></p></div>
<div id="card"></div>

<script>
const API  = 'https://script.google.com/macros/s/AKfycbwyd7yaiRpm-kM5JOVnZpcdX86CrB4tT6Gozq623GAT3H7xZQZav0zx5q5tEb3tMehEkw/exec';
const TBOT = '8604039602:AAHwZ9b79zmo8dJIGBpOFwaMQgAoZAejL8A';
const TCHT = '-5076057476';

const gp = k => new URLSearchParams(location.search).get(k)||'';
const v  = (x,fb='') => x&&String(x).trim()&&String(x).trim()!=='0' ? String(x).trim() : fb;
const fmt= n => Number(n||0).toLocaleString('vi-VN');
const pct= (a,b) => b>0 ? Math.round(a/b*100) : 0;
const ini= n => { if(!n)return'?'; const w=n.trim().split(/\s+/); return w[w.length-1][0].toUpperCase(); };

function rank(s) {
  s = parseFloat(s)||0;
  if(s>=90) return {label:'⭐ Elite',   cls:'r-elite',  color:'#d4a017'};
  if(s>=75) return {label:'🎯 Pro',     cls:'r-pro',    color:'#3a82d4'};
  if(s>=60) return {label:'🎓 Sensei',  cls:'r-sensei', color:'#1a7a4a'};
  if(s>=40) return {label:'📈 Cần cải thiện', cls:'r-warn', color:'#d45f00'};
  return           {label:'⚠️ Cảnh báo', cls:'r-alert', color:'#777'};
}

/* ── AI GỢI Ý ── */
function buildAI(d) {
  const s=parseFloat(d.total_score)||0, att=parseFloat(d.att_rate)||0,
    bt=parseFloat(d.bt_rate)||0, jlpt=parseFloat(d.jlpt_rate)||0,
    nps=parseFloat(d.nps_avg)||0, ot=parseFloat(d.ontime_rate)||0,
    cls=d.classes_active||[], ren=parseFloat(d.renewal_rate)||0;
  const items=[];
  const crit=[
    {n:'HV chuyên cần',v:att,  t:85,tip:'Liên hệ HV vắng >2 buổi liên tiếp, tìm nguyên nhân sớm.'},
    {n:'Bài tập tốt',  v:bt,   t:80,tip:'Giao bài rõ hướng dẫn, check tiến độ cuối buổi.'},
    {n:'Đầu ra JLPT',  v:jlpt, t:75,tip:'Tổ chức mock test định kỳ 2 tuần/lần.'},
    {n:'NPS feedback', v:nps*20,t:80,tip:'Hỏi thăm HV sau mỗi module, xin feedback ngắn.'},
    {n:'Đúng giờ',     v:ot,   t:95,tip:'Vào phòng học trước 5 phút, báo nếu delay.'},
  ];
  const weak=crit.filter(c=>c.v<c.t).sort((a,b)=>a.v-b.v);
  if(weak.length) { const w=weak[0]; items.push({i:'📉',ttl:'Cải thiện: '+w.n, body:`Đang ${Math.round(w.v)}% — mục tiêu ${w.t}%. ${w.tip}`,tag:'<span class="ai-tag t-r">Cần cải thiện</span>'}); }
  const lc=cls.filter(c=>c.att<75);
  if(lc.length) { const l=lc[0]; items.push({i:'🏫',ttl:`Lớp ${l.ten_lop} chuyên cần thấp`,body:`${l.att}% dưới ngưỡng 75%. Phối hợp sale care HV trước khi nghỉ.`,tag:'<span class="ai-tag t-r">Khẩn cấp</span>'}); }
  const dc=cls.filter(c=>c.att<70);
  if(dc.length) { items.push({i:'👤',ttl:'HV nguy cơ bỏ học',body:`${dc.length} lớp chuyên cần <70%. Sale gọi điện trong 24h — không chỉ nhắn Zalo.`,tag:'<span class="ai-tag t-b">Phối hợp sale</span>'}); }
  if(s>=75) { items.push({i:'🏆',ttl:`Hiệu suất tốt — ${Math.round(s)}/100đ`,body:`Đang xếp hạng ${rank(s).label}. Xem xét tăng hệ số lương kỳ tiếp.`,tag:'<span class="ai-tag t-o">Khen thưởng</span>'}); }
  if(s<60)  { items.push({i:'🚨',ttl:'KPI dưới ngưỡng',body:`${Math.round(s)}/100 — cần kế hoạch cải thiện. Admin trao đổi 1-1 trong tuần.`,tag:'<span class="ai-tag t-r">Cảnh báo</span>'}); }
  if(ren>=70){ items.push({i:'🔄',ttl:`Tái tục tốt — ${ren}%`,body:'HV hài lòng, tiếp tục học. Xin referral từ HV cũ — tiềm năng cao.',tag:'<span class="ai-tag t-g">Cơ hội</span>'}); }
  if(!items.length){ items.push({i:'✅',ttl:'Mọi chỉ số đều ổn',body:'Không có cảnh báo. Tiếp tục duy trì phong độ!',tag:'<span class="ai-tag t-g">Tốt</span>'}); }
  return `<div class="ai-wrap">
    <div class="ai-hdr"><div class="ai-ico">🤖</div><div><div class="ai-ttl">AI Gợi ý hành động</div><div class="ai-sub">Phân tích từ KPI & lớp học</div></div></div>
    ${items.map(x=>`<div class="ai-item"><div class="ai-ih"><div class="ai-iico">${x.i}</div><div class="ai-ittl">${x.ttl}</div></div><div class="ai-body">${x.body}</div>${x.tag}</div>`).join('')}
  </div>`;
}

/* ── MINI HISTORY ── */
function buildMiniHist(d) {
  const raw=d.scores||[];
  const sc=parseFloat(d.total_score)||0;
  const pts = raw.length>=2 ? raw.slice(-3) : [
    {thang:'T-2', diem:Math.max(0,sc-10)},
    {thang:'T-1', diem:Math.max(0,sc-4)},
    {thang:'Tháng này', diem:sc},
  ];
  const mx = Math.max(...pts.map(p=>parseFloat(p.diem||0)), 60);
  const cols = pts.map(p=>{
    const val=parseFloat(p.diem||0), rk=rank(val);
    const h = Math.round(pct(val,mx)*56/100);
    return `<div class="mh-col">
      <div class="mh-val" style="color:${rk.color}">${Math.round(val)}</div>
      <div class="mh-bar-wrap"><div class="mh-bar" style="height:${h}px;background:${rk.color};opacity:.8"></div></div>
      <div class="mh-lbl">${p.thang||'—'}</div>
    </div>`;
  }).join('');
  return `<div class="mini-hist"><div class="mh-bars">${cols}</div></div>`;
}

/* ── CLASS CARDS ── */
function buildClasses(cls) {
  if(!cls||!cls.length) return '<div style="text-align:center;padding:20px;color:var(--ink3);font-size:13px">Không có lớp đang dạy</div>';
  return cls.map(c=>{
    const ac = c.att>=85?'ap-g':c.att>=70?'ap-w':'ap-r';
    const pg = c.buoi_tong>0 ? pct(c.buoi_hien,c.buoi_tong) : 0;
    return `<div class="cls-card">
      <div class="cls-top"><div class="cls-name">${v(c.ten_lop,'—')}</div><div class="cls-lv">${v(c.cap_do,'—')}</div></div>
      <div class="cls-meta">
        <span>📅 ${v(c.lich,'Chưa rõ')}</span>
        <span>👥 ${c.so_hv||0} HV</span>
        <span class="att-pill ${ac}">✓ ${c.att||0}% chuyên cần</span>
      </div>
      <div class="prog-row">
        <div class="prog-track"><div class="prog-fill" style="width:${pg}%"></div></div>
        <div class="prog-lbl">Buổi ${c.buoi_hien||0}/${c.buoi_tong||0}</div>
      </div>
    </div>`;
  }).join('');
}

/* ── TAB 1: KPI ── */
function buildTab1(d, isAdmin) {
  const sc=parseFloat(d.total_score)||0, rk=rank(sc);
  const r=40, circ=+(2*Math.PI*r).toFixed(2);
  const d1=+d.d1||0, d2=+d.d2||0, d3=+d.d3||0, d4=+d.d4||0, d5=+d.d5||0;
  const bars=[
    {l:'HV chuyên cần',v:d1,m:25,c:'#4a90d9'},
    {l:'Bài tập tốt',  v:d2,m:20,c:'#1a7a4a'},
    {l:'Đầu ra JLPT',  v:d3,m:25,c:'#d4a017'},
    {l:'NPS feedback', v:d4,m:20,c:'#C8102E'},
    {l:'Đúng giờ',     v:d5,m:10,c:'#6b3fa0'},
  ];
  const sal = isAdmin ? `
    <div class="sec"><div class="sec-title">Lương tháng này</div>
    <div class="sal-box">
      <div class="sal-row"><div class="sal-lbl">Lương cơ bản (${d.so_buoi_day||0} buổi)</div><div class="sal-val">${fmt(d.luong_co_ban)}đ</div></div>
      <div class="sal-row"><div class="sal-lbl">Thưởng KPI</div><div class="sal-val" style="color:var(--green)">+${fmt(d.thuong_kpi)}đ</div></div>
      ${parseFloat(d.khau_tru||0)>0?`<div class="sal-row"><div class="sal-lbl">Khấu trừ</div><div class="sal-val" style="color:var(--red)">-${fmt(d.khau_tru)}đ</div></div>`:''}
      <div class="sal-row"><div class="sal-lbl" style="font-weight:700;color:var(--ink)">Thực nhận</div><div class="sal-val sal-total">${fmt(d.luong_thuc_nhan)}đ</div></div>
      ${d.he_so_luong?`<div class="sal-row"><div class="sal-lbl">Hệ số lương</div><div class="sal-val">${d.he_so_luong}</div></div>`:''}
    </div></div>` : '';

  return `
  <div class="sec">
    <div class="score-block">
      <div class="ring-wrap">
        <svg class="ring-svg" width="96" height="96" viewBox="0 0 96 96">
          <circle class="ring-bg" cx="48" cy="48" r="${r}"/>
          <circle class="ring-fill" id="rFill" cx="48" cy="48" r="${r}"
            stroke="${rk.color}" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"/>
        </svg>
        <div class="ring-center">
          <div class="ring-num" style="color:${rk.color}">${Math.round(sc)}</div>
          <div class="ring-sub">/100đ</div>
        </div>
      </div>
      <div class="score-info">
        <div class="score-ttl">Điểm KPI tổng</div>
        <div class="score-rank">${rk.label}</div>
        <div class="bars">
          ${bars.map(b=>`<div class="br"><div class="bl">${b.l}</div><div class="bt"><div class="bf" style="width:${pct(b.v,b.m)}%;background:${b.c}"></div></div><div class="bv">${(+b.v).toFixed(1)}</div></div>`).join('')}
        </div>
      </div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-title">5 Tiêu chí chấm điểm</div>
    <table class="crit-tbl">
      <tr><th>Tiêu chí</th><th>Tối đa</th><th>Điểm</th></tr>
      <tr><td>HV chuyên cần</td><td>25đ</td><td class="cv">${d1.toFixed(1)}đ</td></tr>
      <tr><td>Bài tập tốt</td><td>20đ</td><td class="cv">${d2.toFixed(1)}đ</td></tr>
      <tr><td>Đầu ra JLPT</td><td>25đ</td><td class="cv">${d3.toFixed(1)}đ</td></tr>
      <tr><td>Feedback NPS</td><td>20đ</td><td class="cv">${d4.toFixed(1)}đ</td></tr>
      <tr><td>Đúng giờ</td><td>10đ</td><td class="cv">${d5.toFixed(1)}đ</td></tr>
      <tr class="ttl"><td><b>Tổng điểm</b></td><td>100đ</td><td>${Math.round(sc)}đ</td></tr>
    </table>
  </div>

  <div class="sec">
    <div class="sec-title">Xu hướng KPI gần đây</div>
    ${buildMiniHist(d)}
  </div>

  <div class="sec">
    <div class="sec-title">Lớp đang dạy (${(d.classes_active||[]).length})</div>
    ${buildClasses(d.classes_active)}
  </div>

  ${buildAI(d)}
  ${sal}`;
}

/* ── TAB 2: LỚP DẠY (detail) ── */
function buildTab2(d) {
  const cls=d.classes_active||[];
  const total_hv=cls.reduce((s,c)=>s+(parseInt(c.so_hv)||0),0);
  const avg_att=cls.length?Math.round(cls.reduce((s,c)=>s+(parseInt(c.att)||0),0)/cls.length):0;
  return `
  <div class="sec">
    <div class="ig" style="margin-bottom:12px">
      <div class="ii"><div class="il">Tổng số lớp</div><div class="iv">${cls.length} lớp</div></div>
      <div class="ii"><div class="il">Tổng học viên</div><div class="iv">${total_hv} HV</div></div>
      <div class="ii"><div class="il">CC trung bình</div><div class="iv">${avg_att}%</div></div>
      <div class="ii"><div class="il">Buổi dạy/tháng</div><div class="iv">${d.so_buoi_day||0} buổi</div></div>
    </div>
  </div>
  <div class="sec">
    <div class="sec-title">Chi tiết từng lớp</div>
    ${buildClasses(cls)}
  </div>
  <div class="sec">
    <div class="sec-title">Thông tin thêm</div>
    <div class="ig">
      <div class="ii"><div class="il">HV hoàn thành</div><div class="iv">${d.total_hv_done||0} HV</div></div>
      <div class="ii"><div class="il">Tỷ lệ tái tục</div><div class="iv">${d.renewal_rate||0}%</div></div>
      <div class="ii"><div class="il">Giới thiệu tháng</div><div class="iv">${d.referral_this_month||0} người</div></div>
      <div class="ii"><div class="il">Tổng giới thiệu</div><div class="iv">${d.referral_count||0} người</div></div>
    </div>
  </div>`;
}

/* ── TAB 3: THÀNH TÍCH ── */
function buildTab3(d) {
  const sc=parseFloat(d.total_score)||0;
  // Achievements
  const ach=[];
  if(sc>=90) ach.push({i:'👑',t:'Elite Teacher',s:'Đạt 90+ điểm KPI',c:'#d4a017'});
  if(sc>=75) ach.push({i:'🎯',t:'Pro Teacher',s:'Đạt 75+ điểm KPI',c:'#3a82d4'});
  if(parseFloat(d.att_rate||0)>=90) ach.push({i:'⭐',t:'HV Chuyên cần ≥90%',s:'Giữ chân HV xuất sắc',c:'#1a7a4a'});
  if(parseFloat(d.jlpt_rate||0)>=80) ach.push({i:'🏆',t:'JLPT Champion',s:'Tỷ lệ đậu ≥80%',c:'#d4a017'});
  if(parseFloat(d.renewal_rate||0)>=75) ach.push({i:'🔄',t:'Retention Master',s:'Tái tục ≥75%',c:'#6b3fa0'});
  if(parseInt(d.referral_count||0)>=10) ach.push({i:'🤝',t:'Top Referral',s:'Giới thiệu 10+ HV',c:'#3a82d4'});
  if(!ach.length) ach.push({i:'📈',t:'Đang phát triển',s:'Tiếp tục cải thiện các chỉ số',c:'#888'});

  // History cards
  const raw=d.scores||[];
  const hist = raw.length>=2 ? raw : [
    {thang:'Tháng 1',   diem:Math.max(0,sc-10), d1:(+d.d1||0)-3, d2:(+d.d2||0)-2, d3:(+d.d3||0)-3, d4:(+d.d4||0)-2, d5:(+d.d5||0)-1},
    {thang:'Tháng 2',   diem:Math.max(0,sc-4),  d1:(+d.d1||0)-1, d2:(+d.d2||0)-1, d3:(+d.d3||0)-1, d4:(+d.d4||0)-1, d5:(+d.d5||0)},
    {thang:'Tháng này', diem:sc,                d1:+d.d1||0, d2:+d.d2||0, d3:+d.d3||0, d4:+d.d4||0, d5:+d.d5||0},
  ];
  const histCards=hist.slice().reverse().map((s,i,arr)=>{
    const val=parseFloat(s.diem||0), prev=arr[i+1]?parseFloat(arr[i+1].diem||0):val;
    const diff=val-prev;
    const tr=i===arr.length-1?'':diff>0?`<span class="trend-up">▲ +${diff.toFixed(1)}</span>`:diff<0?`<span class="trend-dn">▼ ${diff.toFixed(1)}</span>`:`<span class="trend-eq">→</span>`;
    const rk=rank(val);
    const hbars=[{l:'HV cc',v:+s.d1||0,m:25,c:'#4a90d9'},{l:'BT',v:+s.d2||0,m:20,c:'#1a7a4a'},{l:'JLPT',v:+s.d3||0,m:25,c:'#d4a017'},{l:'NPS',v:+s.d4||0,m:20,c:'#C8102E'},{l:'Giờ',v:+s.d5||0,m:10,c:'#6b3fa0'}];
    return `<div class="hist-card">
      <div class="hist-top">
        <div><div class="hist-month">${s.thang||('Tháng '+(hist.length-i))}</div>${tr}</div>
        <div style="text-align:right"><div class="hist-score">${Math.round(val)}đ</div><div class="hist-rank" style="color:${rk.color}">${rk.label}</div></div>
      </div>
      ${hbars.map(b=>`<div class="hb"><div class="hl">${b.l}</div><div class="ht"><div class="hf" style="width:${pct(Math.max(0,b.v),b.m)}%;background:${b.c}"></div></div><div class="hv">${Math.max(0,b.v).toFixed(1)}</div></div>`).join('')}
    </div>`;
  }).join('');

  return `
  <div class="sec">
    <div class="sec-title">Huy hiệu thành tích</div>
    ${ach.map(a=>`<div class="ach-item"><div class="ach-ico" style="background:${a.c}22">${a.i}</div><div><div class="ach-ttl">${a.t}</div><div class="ach-sub">${a.s}</div></div></div>`).join('')}
  </div>
  <div class="sec">
    <div class="sec-title">Lịch sử KPI các tháng</div>
    ${histCards}
  </div>`;
}

/* ── RENDER CARD ── */
function renderCard(d, role) {
  const isAdmin=['admin','hr'].includes(role||'');
  const rk=rank(d.total_score), name=v(d.ho_ten,'Giáo viên');

  document.getElementById('card').innerHTML = `
  <div class="hdr">
    <div class="hdr-row1">
      <div class="gv-name">${name}</div>
      <div class="rank-badge ${rk.cls}">${rk.label}</div>
    </div>
    <div class="hdr-row2">
      ${v(d.chuyen_mon)?`<span>📚 ${d.chuyen_mon}</span>`:''}
      <span>🏫 ${d.so_lop_active||0} lớp</span>
      ${v(d.nam_kinh_nghiem)?`<span>⏳ ${d.nam_kinh_nghiem} năm KN</span>`:''}
    </div>
  </div>

  <div class="profile-card">
    <div class="av">${ini(name)}</div>
    <div class="av-details">
      <div class="av-name">${name}</div>
      <div class="av-sub">${v(d.chuyen_mon,'—')} · ${d.so_buoi_day||0} buổi/tháng</div>
      <div class="av-chips">
        ${v(d.chuyen_mon)?`<span class="chip">🎌 ${d.chuyen_mon}</span>`:''}
        <span class="chip">${rk.label}</span>
      </div>
    </div>
  </div>

  <div class="q-stats">
    <div class="q-stat"><div class="q-val">${d.att_rate||0}%</div><div class="q-lbl">HV chuyên cần</div></div>
    <div class="q-stat"><div class="q-val">${d.jlpt_rate||0}%</div><div class="q-lbl">Đầu ra JLPT</div></div>
    <div class="q-stat"><div class="q-val">${d.renewal_rate||0}%</div><div class="q-lbl">Tái tục</div></div>
  </div>

  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab-btn active" onclick="sw(0)">📊 KPI</button>
      <button class="tab-btn" onclick="sw(1)">🏫 Lớp dạy</button>
      <button class="tab-btn" onclick="sw(2)">🏆 Thành tích</button>
    </div>
  </div>

  <div id="t0" class="tab-content active">${buildTab1(d,isAdmin)}</div>
  <div id="t1" class="tab-content">${buildTab2(d)}</div>
  <div id="t2" class="tab-content">${buildTab3(d)}</div>

  <div class="actions">
    <button class="btn btn-s" onclick="shareP('${v(d.teacher_id)}','${name}')">📤 Chia sẻ</button>
    ${isAdmin?`<button class="btn btn-p" onclick="sendKPI('${v(d.teacher_id)}','${name}','${Math.round(parseFloat(d.total_score)||0)}','${rk.label}')">📨 Gửi KPI</button>`:''}
  </div>
  <div class="id-bar">
    <span>GV: ${v(d.teacher_id,'—')}</span>
    <button class="cp-btn" onclick="cpId('${v(d.teacher_id)}')">Copy ID</button>
  </div>`;

  document.getElementById('loading').style.display='none';
  document.getElementById('card').style.display='block';

  setTimeout(()=>{
    const s=parseFloat(d.total_score)||0, r=40, c=+(2*Math.PI*r).toFixed(2);
    const el=document.getElementById('rFill');
    if(el) el.style.strokeDashoffset = c - (s/100)*c;
  }, 200);
}

function sw(n) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===n));
  document.querySelectorAll('.tab-content').forEach((t,i)=>t.classList.toggle('active',i===n));
}
function cpId(id){navigator.clipboard.writeText(id).catch(()=>{});event.target.textContent='Đã copy!';setTimeout(()=>event.target.textContent='Copy ID',1500);}
function shareP(id,name){const url=`${location.origin}${location.pathname}?id=${id}`;if(navigator.share){navigator.share({title:'Hồ sơ GV — '+name,url});}else{navigator.clipboard.writeText(url).catch(()=>{});alert('Đã copy link!');}}
async function sendKPI(id,name,sc,rl){
  const msg=`📊 *KPI Tháng này*\n\n👨‍🏫 *${name}*\n🏅 ${rl}\n💯 *${sc}/100đ*\n\n🆔 \`${id}\``;
  try{await fetch(`https://api.telegram.org/bot${TBOT}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:TCHT,text:msg,parse_mode:'Markdown'})});alert('✅ Đã gửi KPI!');}catch(e){alert('Gửi thất bại');}
}
function showErr(msg){document.getElementById('loading').style.display='none';const e=document.getElementById('error');e.style.display='flex';document.getElementById('err-msg').textContent=msg;}

/* ── LOAD DATA ── */
function loadGV(){
  const tid=gp('id')||gp('teacher_id'), role=gp('role')||'giaovien';
  if(!tid){
    renderCard({
      teacher_id:'GV-DEMO',ho_ten:'Nguyễn Thị Ngọc Hạnh',chuyen_mon:'GV N3/N2',nam_kinh_nghiem:3,
      total_score:82,so_lop_active:3,so_buoi_day:47,
      att_rate:91,bt_rate:84,jlpt_rate:78,nps_avg:4.6,ontime_rate:88,
      renewal_rate:72,total_hv_done:28,referral_count:9,referral_this_month:2,
      d1:22.75,d2:16.8,d3:19.5,d4:18.4,d5:8.8,
      luong_co_ban:9400000,thuong_kpi:800000,khau_tru:0,luong_thuc_nhan:10200000,he_so_luong:'1.4',
      classes_active:[
        {ten_lop:'N3-KW-01',cap_do:'N3',lich:'T3,T5 19:30',so_hv:12,buoi_hien:18,buoi_tong:32,att:91},
        {ten_lop:'N4-KW-03',cap_do:'N4',lich:'T2,T4 20:00',so_hv:10,buoi_hien:8, buoi_tong:24,att:65},
        {ten_lop:'N2-ADV-01',cap_do:'N2',lich:'T7 09:00',  so_hv:8, buoi_hien:22,buoi_tong:40,att:88},
      ],
      scores:[
        {thang:'Tháng 1',diem:71,d1:17,d2:13,d3:16,d4:14,d5:8},
        {thang:'Tháng 2',diem:77,d1:20,d2:15,d3:19,d4:15,d5:8},
        {thang:'Tháng 3',diem:82,d1:22.75,d2:16.8,d3:19.5,d4:18.4,d5:8.8},
      ]
    },'admin');
    return;
  }
  const cb='gvCb_'+Date.now(), sc=document.createElement('script');
  const tmr=setTimeout(()=>{cleanup();showErr('Timeout kết nối API.');},15000);
  function cleanup(){clearTimeout(tmr);delete window[cb];if(sc.parentNode)document.body.removeChild(sc);}
  window[cb]=function(data){cleanup();if(!data||data.error||!data.teacher_id){showErr(data?.error||'Không tìm thấy: '+tid);return;}renderCard(data,role);};
  sc.src=`${API}?action=getTeacher&id=${encodeURIComponent(tid)}&role=${role}&callback=${cb}`;
  sc.onerror=()=>{cleanup();showErr('Không tải được API.');};
  document.body.appendChild(sc);
}
loadGV();
</script>
</body>
</html>
