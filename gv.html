<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sensei CRM — Hồ sơ giáo viên</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap');
:root {
  --red:#C8102E;--red-bg:#fff0f3;--red-sub:rgba(200,16,46,0.08);
  --gold:#D4AF37;--gold-bg:rgba(212,175,55,0.12);
  --green:#1D9E75;--green-bg:#E1F5EE;
  --amber:#BA7517;--amber-bg:#FAEEDA;
  --purple:#534AB7;--purple-bg:#EEEDFE;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --dark:#0f0505;--dark2:#1a0808;--dark3:#220c0c;
  --bg:#f7f7f7;--line:#efefef;--line2:#e8e8e8;
  --t1:#1a1a1a;--t2:#555;--t3:#999;
  --font:'Be Vietnam Pro',sans-serif;--r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:var(--dark);font-family:var(--font);font-size:14px;color:var(--t1);overscroll-behavior:none}
#loading{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;transition:opacity .4s}
.ld-logo{width:54px;height:54px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;animation:ldp 1.5s ease-in-out infinite}
.ld-dot{width:32px;height:32px;border-radius:50%;background:var(--red)}
.ld-txt{font-size:12px;color:rgba(255,255,255,.35);letter-spacing:.08em;font-weight:500}
@keyframes ldp{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column;opacity:0;transition:opacity .3s}
#app.ready{opacity:1}

.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--red);position:sticky;top:0;z-index:20}
.back{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:16px;color:white;border:none;cursor:pointer;flex-shrink:0}
.brand{display:flex;align-items:center;gap:7px;flex:1}
.bc{width:26px;height:26px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bci{width:15px;height:15px;border-radius:50%;background:var(--red)}
.bn{font-size:13px;font-weight:700;color:white}
.tid{font-size:10px;color:rgba(255,255,255,.55)}

.hero{padding:14px 16px 12px;background:linear-gradient(180deg,var(--dark2),var(--dark3))}
.hrow{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.av{width:54px;height:54px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:white;flex-shrink:0;border:2.5px solid rgba(200,16,46,.45);position:relative}
.av-r{position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(200,16,46,.2)}
.hname{font-size:16px;font-weight:700;color:white}
.hsub{font-size:11px;color:rgba(255,255,255,.45);margin-top:3px;line-height:1.5}
.bdgs{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.bdg{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px}
.b-elite{background:rgba(212,175,55,.2);color:var(--gold);border:.5px solid rgba(212,175,55,.4)}
.b-pro{background:rgba(29,158,117,.2);color:#5DCAA5;border:.5px solid rgba(29,158,117,.4)}
.b-sensei{background:rgba(83,74,183,.2);color:#AFA9EC;border:.5px solid rgba(83,74,183,.4)}
.b-improve{background:rgba(186,117,23,.2);color:#FAC775;border:.5px solid rgba(186,117,23,.4)}
.b-warn{background:rgba(200,16,46,.22);color:#ff8888;border:.5px solid rgba(200,16,46,.4)}
.b-cap{background:rgba(24,95,165,.2);color:#85B7EB;border:.5px solid rgba(24,95,165,.4)}

.score-block{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sb-main{background:rgba(255,255,255,.07);border-radius:9px;padding:11px 13px;border:.5px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:12px}
.sb-score{font-size:36px;font-weight:700;line-height:1}
.sb-label{font-size:10px;color:rgba(255,255,255,.4);margin-top:3px}
.sb-rank{font-size:11px;font-weight:700;margin-top:4px}
.sb-right{display:flex;flex-direction:column;gap:5px}
.sb-mini{background:rgba(255,255,255,.06);border-radius:7px;padding:7px 10px;border:.5px solid rgba(255,255,255,.05)}
.sm-v{font-size:15px;font-weight:700;color:rgba(255,255,255,.9)}
.sm-l{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px}

.kpi3{display:grid;grid-template-columns:1fr 1fr 1fr;background:#0f0505;border-bottom:1px solid rgba(200,16,46,.1)}
.ki{padding:11px 4px;text-align:center;border-right:.5px solid rgba(255,255,255,.04)}
.ki:last-child{border-right:none}
.kv{font-size:20px;font-weight:700}.kl{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px}

.tabs{display:flex;gap:4px;padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--line);position:sticky;top:50px;z-index:19}
.tab{flex:1;padding:7px 4px;border-radius:7px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:none;color:var(--t3);background:transparent;font-family:var(--font);transition:all .2s}
.tab.active{background:var(--red);color:white}

.panel{display:none}.panel.active{display:block}
.sec{border-top:1px solid var(--line)}
.sech{padding:12px 16px 6px;display:flex;justify-content:space-between;align-items:center}
.sect{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.07em}
.seca{font-size:12px;color:var(--red);cursor:pointer;font-weight:600}

.bars{padding:4px 16px 12px;display:flex;flex-direction:column;gap:9px}
.br{display:flex;align-items:center;gap:8px}
.bl{font-size:12px;color:var(--t2);min-width:100px}
.bt{flex:1;height:5px;background:#f0f0f0;border-radius:99px;overflow:hidden}
.bf{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.bp{font-size:12px;font-weight:700;min-width:40px;text-align:right}

/* SCORE TABLE */
.stable{margin:4px 16px 14px;border:.5px solid var(--line);border-radius:var(--r);overflow:hidden}
.str{display:grid;grid-template-columns:1fr 55px 50px;padding:9px 12px;border-bottom:.5px solid var(--line);font-size:12px;align-items:center}
.str:last-child{border-bottom:none}
.str.hdr{background:var(--bg);font-size:10px;color:var(--t3);font-weight:700}
.str.total{background:var(--red-bg);border-top:1px solid rgba(200,16,46,.15)}
.sc-name{font-weight:600;color:var(--t1)}
.sc-max{color:var(--t3);text-align:center;font-size:11px}
.sc-val{font-weight:700;text-align:right}

/* TỶLỆ BOX */
.ratio-grid{padding:4px 16px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ratio-item{background:var(--bg);border:.5px solid var(--line);border-radius:var(--r);padding:12px 14px;text-align:center}
.ratio-val{font-size:26px;font-weight:700}
.ratio-label{font-size:11px;color:var(--t2);margin-top:4px;line-height:1.4}
.ratio-sub{font-size:10px;color:var(--t3);margin-top:3px}
.ratio-vs{font-size:11px;font-weight:600;margin-top:5px;padding:2px 8px;border-radius:99px;display:inline-block}

/* CLASS LIST */
.class-list{padding:4px 16px 12px;display:flex;flex-direction:column;gap:7px}
.cl{background:var(--bg);border:.5px solid var(--line);border-radius:var(--rs);padding:9px 12px;display:flex;align-items:center;gap:10px}
.cl-bdg{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--red-bg);color:var(--red);border:.5px solid rgba(200,16,46,.2);flex-shrink:0}
.cl-info{flex:1}
.cl-name{font-size:12px;font-weight:700;color:var(--t1)}
.cl-sub{font-size:10px;color:var(--t3);margin-top:2px}
.cl-att{font-size:13px;font-weight:700}

/* SALARY SECTION */
.salary-locked{margin:4px 16px 14px;padding:16px;background:var(--bg);border:.5px solid var(--line);border-radius:var(--r);text-align:center}
.lock-icon{font-size:28px;margin-bottom:8px}
.lock-txt{font-size:13px;color:var(--t2);line-height:1.6}
.lock-role{font-size:11px;color:var(--t3);margin-top:4px}

.salary-box{margin:4px 16px 14px}
.sal-header{background:linear-gradient(135deg,var(--dark2),var(--dark3));border-radius:var(--r) var(--r) 0 0;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.sal-title{font-size:13px;font-weight:700;color:rgba(255,255,255,.7)}
.sal-amount{font-size:22px;font-weight:700;color:var(--gold)}
.sal-body{background:var(--bg);border:.5px solid var(--line);border-top:none;border-radius:0 0 var(--r) var(--r);padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sal-item{background:white;border:.5px solid var(--line);border-radius:var(--rs);padding:8px 10px}
.sal-label{font-size:10px;color:var(--t3);margin-bottom:3px}
.sal-val{font-size:13px;font-weight:700;color:var(--t1)}
.sal-val.green{color:var(--green)}.sal-val.red{color:var(--red)}.sal-val.gold{color:#9a7a00}

/* HISTORY */
.hist-month{margin:4px 16px 8px}
.hm-title{font-size:11px;font-weight:700;color:var(--t3);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.hm-line{flex:1;height:.5px;background:var(--line)}
.hm-items{display:flex;flex-direction:column;gap:5px}
.hm-item{background:var(--bg);border:.5px solid var(--line);border-radius:var(--rs);padding:9px 12px;display:flex;align-items:center;gap:9px}
.hm-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.hm-body{flex:1}
.hm-txt{font-size:12px;color:var(--t1);font-weight:500}
.hm-sub{font-size:10px;color:var(--t3);margin-top:2px}
.hm-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;flex-shrink:0}

/* KPI HISTORY CHART */
.kpi-history{margin:4px 16px 14px;background:var(--bg);border:.5px solid var(--line);border-radius:var(--r);overflow:hidden}
.kh-head{padding:10px 14px;background:white;border-bottom:.5px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.kh-title{font-size:12px;font-weight:700;color:var(--t1)}
.kh-avg{font-size:11px;color:var(--t3)}
.kh-bars{padding:10px 14px;display:flex;gap:6px;align-items:flex-end;height:80px}
.khb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.khb-bar{width:100%;border-radius:4px 4px 0 0;transition:height .6s cubic-bezier(.4,0,.2,1)}
.khb-val{font-size:9px;font-weight:700}
.khb-month{font-size:9px;color:var(--t3)}

/* AI BOX */
.aibox{margin:4px 16px 14px;border-radius:var(--r);overflow:hidden;border:.5px solid rgba(83,74,183,.3)}
.aih{padding:11px 14px;background:linear-gradient(135deg,#1a1040,#2a1860);display:flex;align-items:center;gap:9px}
.aiico{width:30px;height:30px;border-radius:50%;background:rgba(175,169,236,.15);border:.5px solid rgba(175,169,236,.3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.aitl{font-size:13px;font-weight:700;color:#CECBF6}
.aits{font-size:10px;color:rgba(175,169,236,.6);margin-top:1px}
.aibody{background:#f5f4ff}
.aii{padding:10px 14px;border-bottom:.5px solid rgba(83,74,183,.1);display:flex;gap:9px;align-items:flex-start}
.aii:last-child{border-bottom:none}
.aibu{width:24px;height:24px;border-radius:50%;background:rgba(83,74,183,.12);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px}
.aic{flex:1}
.ailb{font-size:11px;font-weight:700;color:var(--purple);margin-bottom:3px}
.aitxt{font-size:12px;color:var(--t2);line-height:1.55}.aitxt strong{color:var(--t1);font-weight:700}
.aitag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;margin-top:5px;display:inline-block}
.aitag.high{background:rgba(200,16,46,.1);color:var(--red)}
.aitag.mid{background:var(--amber-bg);color:var(--amber)}
.aitag.low{background:var(--green-bg);color:var(--green)}

.actions{padding:12px 14px 16px;display:flex;gap:8px}
.btn{flex:1;padding:11px 6px;border-radius:var(--rs);font-size:13px;font-weight:700;text-align:center;cursor:pointer;border:none;font-family:var(--font);transition:opacity .15s,transform .1s}
.btn:active{opacity:.85;transform:scale(.98)}
.btnr{background:var(--red);color:white}
.btno{background:white;color:var(--red);border:1.5px solid var(--red)}
.btng{background:var(--bg);color:var(--t2);border:.5px solid var(--line)}
.footer{padding:10px 16px;background:var(--bg);border-top:1px solid var(--line);display:flex;align-items:center;gap:7px}
.fc{width:18px;height:18px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fi{width:10px;height:10px;border-radius:50%;background:white}
.ft{font-size:11px;color:var(--t3)}.ft span{color:var(--red);font-weight:700}
.errbox{margin:40px 20px;padding:20px;background:var(--red-bg);border:1px solid rgba(200,16,46,.3);border-radius:var(--r);text-align:center}
.errbox h3{color:var(--red);margin-bottom:8px}.errbox p{font-size:13px;color:var(--t2);line-height:1.6}
</style>
</head>
<body>
<div id="loading">
  <div class="ld-logo"><div class="ld-dot"></div></div>
  <div class="ld-txt">SENSEI NIHONGO · CRM</div>
</div>
<div id="app">
  <div class="topbar">
    <button class="back" onclick="history.back()">&#8592;</button>
    <div class="brand"><div class="bc"><div class="bci"></div></div><div class="bn">Sensei Nihongo</div></div>
    <div class="tid" id="tid">GV-????</div>
  </div>
  <div id="root"></div>
</div>
<script>
// ─────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxJi8mcZzaAT1YweQ3zPhWjlA0Dr9B-S2GoOj-6nenAKiJcxYoLdO0t-9Ezf3nBSZPF4Q/exec';

// RANK RULES — GV
const GV_RANKS = [
  { key:'elite',   label:'Sensei Elite',      min:90, cls:'b-elite',   color:'#D4AF37' },
  { key:'pro',     label:'Sensei Pro',         min:75, cls:'b-pro',    color:'#5DCAA5' },
  { key:'sensei',  label:'Sensei',             min:60, cls:'b-sensei', color:'#AFA9EC' },
  { key:'improve', label:'Cần cải thiện',      min:40, cls:'b-improve',color:'#FAC775' },
  { key:'warn',    label:'Cảnh báo',           min:0,  cls:'b-warn',   color:'#ff8888' },
];

// PHÂN QUYỀN — đọc từ URL param ?role=admin|hr|gv
function getRole() {
  const p = new URLSearchParams(location.search);
  return p.get('role') || 'gv'; // default: GV
}

function canSeeSalary(role) {
  return ['admin','hr','gv'].includes(role); // GV xem lương mình, admin/hr xem tất
}

function canSeeHeSo(role) {
  return ['admin','hr'].includes(role); // chỉ admin/hr xem hệ số
}

function getGVRank(score) {
  for (const r of GV_RANKS) { if (score >= r.min) return r; }
  return GV_RANKS[4];
}

function fmtM(n) { return n ? Number(n).toLocaleString('vi-VN') + 'đ' : '0đ'; }
function fmtP(n) { return Math.round(n) + '%'; }
function ini(name) {
  if (!name) return 'GV';
  const p = name.trim().split(' ');
  return p.length >= 2 ? (p[p.length-2][0] + p[p.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
}

// ─────────────────────────────────────────
// AI INSIGHTS CHO GV
// ─────────────────────────────────────────
function gvInsights(gv, rank) {
  const ins = [];
  const att = gv.att_rate || 0;
  const jlpt = gv.jlpt_rate || 0;
  const renewal = gv.renewal_rate || 0;
  const nps = gv.nps_avg || 0;
  const score = gv.total_score || 0;

  if (score >= 90) {
    ins.push({ icon:'🏆', pr:'low', lb:'GV xuất sắc — nhân rộng phương pháp', txt:`Điểm <strong>${score}đ</strong> — top Elite. Đề xuất chia sẻ phương pháp dạy với GV khác trong buổi họp tháng tới. Ưu tiên phân lớp chiến lược cho GV này.`, tag:'Phát triển' });
  } else if (score < 60) {
    ins.push({ icon:'⚠️', pr:'high', lb:'Điểm thấp — cần coaching khẩn', txt:`Điểm <strong>${score}đ</strong> dưới ngưỡng Sensei. R&D cần có buổi coaching 1-1 trong tuần này. Nếu không cải thiện sau 2 tháng, xem xét lại hợp đồng.`, tag:'Khẩn cấp' });
  }

  if (att < 80) {
    ins.push({ icon:'📉', pr:'high', lb:'HV chuyên cần thấp — dấu hiệu dạy kém hấp dẫn', txt:`Chuyên cần HV chỉ <strong>${fmtP(att)}</strong>. Có thể do nội dung khó, GV thiếu tương tác, hoặc giờ học không phù hợp. R&D cần dự giờ 1 buổi để đánh giá.`, tag:'Cần xem xét' });
  }

  if (jlpt < 70) {
    ins.push({ icon:'🎯', pr:'mid', lb:'Tỷ lệ đỗ JLPT thấp hơn trung bình', txt:`Đỗ JLPT <strong>${fmtP(jlpt)}</strong> — thấp hơn target 70%. Ảnh hưởng trực tiếp đến retention HV. GV cần cải thiện cách luyện đề và chiến lược thi.`, tag:'Cần cải thiện' });
  }

  if (renewal >= 65) {
    ins.push({ icon:'♻️', pr:'low', lb:'Tỷ lệ tái tục cao — GV được HV tin tưởng', txt:`<strong>${fmtP(renewal)}</strong> HV tái tục sau khi học với GV này — cao hơn trung bình trường. Đây là chỉ số chất lượng quan trọng nhất.`, tag:'Điểm mạnh' });
  } else if (renewal < 50) {
    ins.push({ icon:'📊', pr:'mid', lb:'Tỷ lệ tái tục thấp', txt:`Chỉ <strong>${fmtP(renewal)}</strong> HV tái tục. CS cần khảo sát HV đã nghỉ xem lý do. Có thể do kỳ vọng không khớp hoặc chất lượng giảng dạy.`, tag:'Cần phân tích' });
  }

  if (nps >= 4.5) {
    ins.push({ icon:'⭐', pr:'low', lb:'NPS xuất sắc — HV rất hài lòng', txt:`NPS <strong>${nps.toFixed(1)}/5</strong> — HV đánh giá rất cao. Đề xuất dùng feedback HV làm nội dung marketing cho Sensei.`, tag:'Tận dụng' });
  }

  return ins.slice(0, 4);
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function render(gv) {
  const role = getRole();
  const rank = getGVRank(gv.total_score || 0);
  const insights = gvInsights(gv, rank);
  document.getElementById('tid').textContent = gv.teacher_id || 'GV-????';

  // Score color
  const sc = gv.total_score || 0;
  const scColor = sc >= 90 ? '#D4AF37' : sc >= 75 ? '#5DCAA5' : sc >= 60 ? '#AFA9EC' : sc >= 40 ? '#FAC775' : '#ff8888';

  // KPI bars
  const barsH = `
    <div class="br"><div class="bl">HV chuyên cần</div><div class="bt"><div class="bf" style="width:${gv.att_rate||0}%;background:#1D9E75"></div></div><div class="bp" style="color:#1D9E75">${fmtP(gv.att_rate||0)}</div></div>
    <div class="br"><div class="bl">Bài tập tốt</div><div class="bt"><div class="bf" style="width:${gv.bt_rate||0}%;background:#534AB7"></div></div><div class="bp" style="color:#534AB7">${fmtP(gv.bt_rate||0)}</div></div>
    <div class="br"><div class="bl">Đầu ra JLPT</div><div class="bt"><div class="bf" style="width:${gv.jlpt_rate||0}%;background:#D4AF37"></div></div><div class="bp" style="color:#D4AF37">${fmtP(gv.jlpt_rate||0)}</div></div>
    <div class="br"><div class="bl">Feedback NPS</div><div class="bt"><div class="bf" style="width:${(gv.nps_avg||0)*20}%;background:#185FA5"></div></div><div class="bp" style="color:#185FA5">${(gv.nps_avg||0).toFixed(1)}/5</div></div>

// ─────────────────────────────────────────
// TABS
// ─────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('p-'+id)?.classList.add('active');
  btn.classList.add('active');
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
async function init() {
  const p = new URLSearchParams(location.search);
  const id = p.get('id') || p.get('teacher_id');
  try {
    let gv;
    if (!id || SCRIPT_URL.includes('YOUR_SCRIPT')) {
      await new Promise(r=>setTimeout(r,700));
      gv = demoData(id);
    } else {
      const res = await fetch(`${SCRIPT_URL}?action=getTeacher&id=${encodeURIComponent(id)}&role=${getRole()}`);
      gv = await res.json();
      if (gv.error) throw new Error(gv.error);
    }
    render(gv);
  } catch(e) {
    document.getElementById('root').innerHTML = `<div class="errbox"><h3>Không tải được dữ liệu</h3><p>ID: ${id||'?'}<br>Lỗi: ${e.message}</p></div>`;
  } finally {
    document.getElementById('loading').style.opacity='0';
    setTimeout(()=>{
      document.getElementById('loading').style.display='none';
      document.getElementById('app').classList.add('ready');
    },400);
  }
}
init();
</script>
