<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sensei CRM — Hồ sơ học viên</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap');
:root {
  --red:#C8102E;--red-bg:#fff0f3;--red-sub:rgba(200,16,46,0.08);
  --gold:#D4AF37;--green:#1D9E75;--amber:#BA7517;--purple:#534AB7;
  --dark:#0f0505;--dark2:#1a0808;--dark3:#220c0c;
  --bg:#f7f7f7;--line:#efefef;--line2:#e8e8e8;
  --t1:#1a1a1a;--t2:#555;--t3:#999;
  --font:'Be Vietnam Pro',sans-serif;--r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:var(--dark);font-family:var(--font);font-size:14px;color:var(--t1);overscroll-behavior:none}
#loading{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;transition:opacity .4s}
.ld-logo{width:54px;height:54px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;animation:ldp 1.5s ease-in-out infinite}
.ld-dot{width:32px;height:32px;border-radius:50%;background:var(--red)}
.ld-txt{font-size:12px;color:rgba(255,255,255,.35);letter-spacing:.08em;font-weight:500}
@keyframes ldp{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column;opacity:0;transition:opacity .3s}
#app.ready{opacity:1}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--red);position:sticky;top:0;z-index:20}
.back{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:16px;color:white;border:none;cursor:pointer;flex-shrink:0}
.brand{display:flex;align-items:center;gap:7px;flex:1}
.bc{width:26px;height:26px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bci{width:15px;height:15px;border-radius:50%;background:var(--red)}
.bn{font-size:13px;font-weight:700;color:white}
.tid{font-size:10px;color:rgba(255,255,255,.55)}
.hero{padding:14px 16px 12px;background:linear-gradient(180deg,var(--dark2),var(--dark3))}
.hrow{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.av{width:52px;height:52px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:white;flex-shrink:0;border:2.5px solid rgba(200,16,46,.45);position:relative}
.av-r{position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(200,16,46,.2)}
.hname{font-size:16px;font-weight:700;color:white}
.hsub{font-size:11px;color:rgba(255,255,255,.45);margin-top:3px;line-height:1.5}
.bdgs{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.bdg{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px}
.bwarn{background:rgba(200,16,46,.22);color:#ff8888;border:.5px solid rgba(200,16,46,.4)}
.bok{background:rgba(29,158,117,.2);color:#5DCAA5;border:.5px solid rgba(29,158,117,.4)}
.bsilver{background:rgba(180,180,180,.12);color:#ccc;border:.5px solid rgba(200,200,200,.25)}
.bgold{background:rgba(212,175,55,.18);color:var(--gold);border:.5px solid rgba(212,175,55,.4)}
.bdiamond{background:rgba(127,119,221,.2);color:#AFA9EC;border:.5px solid rgba(127,119,221,.4)}
.bbronze{background:rgba(205,127,50,.2);color:#cd7f32;border:.5px solid rgba(205,127,50,.4)}
.hmeta{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.mm{background:rgba(255,255,255,.06);border-radius:7px;padding:8px 10px;border:.5px solid rgba(255,255,255,.05)}
.mml{font-size:10px;color:rgba(255,255,255,.3);margin-bottom:2px}
.mmv{font-size:12px;font-weight:600;color:rgba(255,255,255,.9)}
.mmv.gold{color:var(--gold)}.mmv.green{color:#5DCAA5}.mmv.red{color:#ff8888}
.kpi3{display:grid;grid-template-columns:1fr 1fr 1fr;background:#0f0505;border-bottom:1px solid rgba(200,16,46,.1)}
.ki{padding:12px 4px;text-align:center;border-right:.5px solid rgba(255,255,255,.04)}
.ki:last-child{border-right:none}
.kv{font-size:22px;font-weight:700}.kl{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px}
.alert{margin:10px 14px;padding:9px 13px;background:var(--red-sub);border-radius:var(--rs);border:.5px solid rgba(200,16,46,.25);display:flex;gap:9px;align-items:flex-start}
.adot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:3px;animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.atxt{font-size:12px;color:var(--red);line-height:1.5;font-weight:500}
.tabs{display:flex;gap:4px;padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--line);position:sticky;top:50px;z-index:19}
.tab{flex:1;padding:7px 4px;border-radius:7px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:none;color:var(--t3);background:transparent;font-family:var(--font);transition:all .2s}
.tab.active{background:var(--red);color:white}
.panel{display:none}.panel.active{display:block}
.sec{border-top:1px solid var(--line)}
.sech{padding:12px 16px 6px;display:flex;justify-content:space-between;align-items:center}
.sect{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.07em}
.seca{font-size:12px;color:var(--red);cursor:pointer;font-weight:600}
.bars{padding:4px 16px 12px;display:flex;flex-direction:column;gap:9px}
.br{display:flex;align-items:center;gap:8px}
.bl{font-size:12px;color:var(--t2);min-width:100px}
.bt{flex:1;height:5px;background:#f0f0f0;border-radius:99px;overflow:hidden}
.bf{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.bp{font-size:12px;font-weight:700;min-width:38px;text-align:right}
.igrid{padding:4px 16px 14px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.ii{background:var(--bg);border:.5px solid var(--line);border-radius:var(--rs);padding:9px 11px}
.il{font-size:10px;color:var(--t3);margin-bottom:3px}
.iv{font-size:12px;font-weight:600;color:var(--t1)}
.iv.red{color:var(--red)}.iv.gold{color:#9a7a00}.iv.green{color:var(--green)}
.care-list{padding:4px 16px 12px}
.ci{display:flex;gap:9px;align-items:flex-start;padding:10px 0;border-bottom:.5px solid var(--line)}
.ci:last-child{border-bottom:none}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.cb{flex:1}.cn{font-size:12px;color:var(--t1);line-height:1.5}.cm{font-size:10px;color:var(--t3);margin-top:3px}
.ctag{font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px;flex-shrink:0;white-space:nowrap;margin-top:2px}
.sc{margin:4px 16px 14px;background:var(--bg);border:.5px solid var(--line);border-radius:var(--r);overflow:hidden}
.sh{padding:11px 13px;background:var(--red-bg);border-bottom:.5px solid rgba(200,16,46,.1);display:flex;align-items:center;gap:10px}
.sav{width:36px;height:36px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0}
.sn{font-size:13px;font-weight:700;color:var(--t1)}.sr{font-size:10px;color:var(--red);margin-top:2px;font-weight:500}
.skpi{margin-left:auto;text-align:right}.skv{font-size:13px;font-weight:700;color:var(--t1)}.skl{font-size:10px;color:var(--t3)}
.ss{display:grid;grid-template-columns:1fr 1fr 1fr;padding:11px 13px;gap:6px}
.ssi{text-align:center}.ssv{font-size:14px;font-weight:700;color:var(--t1)}.ssl{font-size:10px;color:var(--t3);margin-top:2px}
.tl{padding:0 13px 11px;display:flex;align-items:center}
.tli{flex:1;text-align:center}
.tld{width:9px;height:9px;border-radius:50%;margin:0 auto 4px}
.tld.done{background:var(--red)}.tld.now{background:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.2)}.tld.todo{background:#ddd}
.tlln{flex:1;height:1.5px;background:var(--line2);align-self:center;position:relative;top:-6px}
.tlln.done{background:var(--red)}
.tllb{font-size:9px;color:var(--t3);line-height:1.4}
.tllb.done{color:var(--red);font-weight:700}.tllb.now{color:#9a7a00;font-weight:700}
.rtable{margin:4px 16px 8px;border:.5px solid var(--line);border-radius:var(--r);overflow:hidden}
.rr{display:grid;grid-template-columns:24px 1fr 70px 1fr;align-items:center;padding:9px 12px;border-bottom:.5px solid var(--line);font-size:12px}
.rr:last-child{border-bottom:none}
.rr.hdr{background:var(--bg);font-size:10px;color:var(--t3);font-weight:700}
.rr.cur{background:var(--red-bg);border-left:3px solid var(--red)}
.ri{font-size:14px;text-align:center}
.rn{font-weight:600;color:var(--t1);line-height:1.4}.rn small{display:block;font-size:10px;color:var(--t3);font-weight:400}
.rr.cur .rn{color:var(--red)}
.rm{font-size:11px;color:var(--t2)}
.rp{display:flex;gap:3px;flex-wrap:wrap}
.pk{font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;background:#f0f0f0;color:var(--t2)}
.rr.cur .pk{background:rgba(200,16,46,.1);color:var(--red)}
.ubox{margin:0 16px 14px;padding:12px 14px;background:var(--red-bg);border:.5px solid rgba(200,16,46,.2);border-radius:var(--rs)}
.ut{font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px}
.up{font-size:12px;color:var(--t2);line-height:1.6}.up strong{color:var(--red);font-weight:700}

/* ★ AI BOX */
.aibox{margin:4px 16px 14px;border-radius:var(--r);overflow:hidden;border:.5px solid rgba(83,74,183,.3)}
.aih{padding:11px 14px;background:linear-gradient(135deg,#1a1040,#2a1860);display:flex;align-items:center;gap:9px}
.aiico{width:32px;height:32px;border-radius:50%;background:rgba(175,169,236,.15);border:.5px solid rgba(175,169,236,.3);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.aitl{font-size:13px;font-weight:700;color:#CECBF6}
.aits{font-size:10px;color:rgba(175,169,236,.6);margin-top:1px}
.aibody{background:#f5f4ff}
.aii{padding:10px 14px;border-bottom:.5px solid rgba(83,74,183,.1);display:flex;gap:10px;align-items:flex-start}
.aii:last-child{border-bottom:none}
.aibu{width:26px;height:26px;border-radius:50%;background:rgba(83,74,183,.12);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px}
.aic{flex:1}
.ailb{font-size:11px;font-weight:700;color:var(--purple);margin-bottom:3px}
.aitxt{font-size:12px;color:var(--t2);line-height:1.55}.aitxt strong{color:var(--t1);font-weight:700}
.aitag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;margin-top:5px;display:inline-block}
.aitag.high{background:rgba(200,16,46,.1);color:var(--red)}
.aitag.mid{background:#FAEEDA;color:var(--amber)}
.aitag.low{background:#E1F5EE;color:var(--green)}

/* DRILL-DOWN */
.dbtn{margin:6px 14px 10px;padding:12px 16px;background:var(--red-bg);border:.5px solid rgba(200,16,46,.2);border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .2s;user-select:none}
.dbtn:hover{background:#ffe0e6}
.dtxt{font-size:13px;font-weight:700;color:var(--red)}
.darr{font-size:20px;color:var(--red);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.darr.open{transform:rotate(90deg)}
.drawer{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1);background:var(--bg);border-top:0 solid var(--line)}
.drawer.open{max-height:2400px;border-top:1px solid var(--line)}
.dri{padding:6px 0 10px}
.dsec-t{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.07em;padding:10px 16px 6px;display:block}

.actions{padding:12px 14px 16px;display:flex;gap:8px}
.btn{flex:1;padding:11px 6px;border-radius:var(--rs);font-size:13px;font-weight:700;text-align:center;cursor:pointer;border:none;font-family:var(--font);transition:opacity .15s,transform .1s}
.btn:active{opacity:.85;transform:scale(.98)}
.btnr{background:var(--red);color:white}
.btno{background:white;color:var(--red);border:1.5px solid var(--red)}
.btng{background:var(--bg);color:var(--t2);border:.5px solid var(--line)}
.footer{padding:10px 16px;background:var(--bg);border-top:1px solid var(--line);display:flex;align-items:center;gap:7px}
.fc{width:18px;height:18px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fi{width:10px;height:10px;border-radius:50%;background:white}
.ft{font-size:11px;color:var(--t3)}.ft span{color:var(--red);font-weight:700}
.errbox{margin:40px 20px;padding:20px;background:var(--red-bg);border:1px solid rgba(200,16,46,.3);border-radius:var(--r);text-align:center}
.errbox h3{color:var(--red);margin-bottom:8px}.errbox p{font-size:13px;color:var(--t2);line-height:1.6}
</style>
</head>
<body>
<div id="loading">
  <div class="ld-logo"><div class="ld-dot"></div></div>
  <div class="ld-txt">SENSEI NIHONGO · CRM</div>
</div>
<div id="app">
  <div class="topbar">
    <button class="back" onclick="history.back()">&#8592;</button>
    <div class="brand"><div class="bc"><div class="bci"></div></div><div class="bn">Sensei Nihongo</div></div>
    <div class="tid" id="tid">HV-?????</div>
  </div>
  <div id="root"></div>
</div>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbxJi8mcZzaAT1YweQ3zPhWjlA0Dr9B-S2GoOj-6nenAKiJcxYoLdO0t-9Ezf3nBSZPF4Q/exec';
const RANKS=[
  {key:'diamond',icon:'✦',label:'Diamond',sub:'Thượng khách',min:20000000,pct:20,perks:['GV riêng','Lớp VIP','-20%']},
  {key:'gold',icon:'◆',label:'Gold',sub:'Học viên vàng',min:12000000,pct:15,perks:['Ưu tiên lớp','-15%']},
  {key:'silver',icon:'◈',label:'Silver',sub:'Học viên thân',min:8000000,pct:10,perks:['CS ưu tiên','-10%']},
  {key:'bronze',icon:'○',label:'Bronze',sub:'Học viên mới',min:4000000,pct:5,perks:['CS cơ bản']},
  {key:'new',icon:'·',label:'New',sub:'Mới đăng ký',min:0,pct:0,perks:['Onboard']},
];
function getRank(f){for(const r of RANKS){if(f>=r.min)return r;}return RANKS[4];}
function nextRank(cur){const i=RANKS.findIndex(r=>r.key===cur.key);return i>0?RANKS[i-1]:null;}
function fmtM(n){return n?Number(n).toLocaleString('vi-VN')+'đ':'0đ';}
function fmtP(n){return Math.round(n)+'%';}
function ini(name){if(!name)return'HV';const p=name.trim().split(' ');return p.length>=2?(p[p.length-2][0]+p[p.length-1][0]).toUpperCase():name.slice(0,2).toUpperCase();}
function bdgCls(r){return{diamond:'bdiamond',gold:'bgold',silver:'bsilver',bronze:'bbronze',new:''}[r.key]||'';}

function aiInsights(hv,rank,nr,need){
  const ins=[];
  const att=hv.chuyen_can||0, sc=hv.diem_tb||0, fee=hv.tong_hoc_phi||0;
  if(nr) ins.push({icon:'💎',pr:'high',lb:`Upsell → ${nr.label}`,txt:`Chỉ cần thêm <strong>${fmtM(need)}</strong> để đạt hạng <strong>${nr.label}</strong> — được giảm <strong>${nr.pct}%</strong>${nr.perks.length>1?' + '+nr.perks.slice(1).join(', '):''}. Tư vấn ngay khi khóa kết thúc.`,tag:'Ưu tiên cao'});
  if(att<70) ins.push({icon:'⚠️',pr:'high',lb:'Nguy cơ bỏ học — can thiệp ngay',txt:`Chuyên cần <strong>${fmtP(att)}</strong> dưới ngưỡng an toàn. Sale <strong>${hv.sale_phu_trach||''}</strong> gọi điện trực tiếp trong 24h — không chỉ nhắn Zalo.`,tag:'Khẩn cấp'});
  else if(att<80) ins.push({icon:'📉',pr:'mid',lb:'Chuyên cần đang giảm',txt:`Chuyên cần <strong>${fmtP(att)}</strong> ở mức trung bình. Nếu xuống dưới 70%, rủi ro bỏ học tăng cao. CS check-in ngay tuần này.`,tag:'Cần theo dõi'});
  if(sc<6) ins.push({icon:'📚',pr:'mid',lb:`Học lực yếu — hỗ trợ ${hv.ky_nang_yeu||'nội dung'}`,txt:`Điểm TB <strong>${sc.toFixed(1)}</strong>. GV nên tổ chức buổi ôn tập riêng. Không cải thiện → khả năng đỗ JLPT thấp → giảm tái tục.`,tag:'Cần hỗ trợ'});
  if(['D8','D9'].includes(hv.d_level)) ins.push({icon:'♻️',pr:'mid',lb:'Window tái tục D10 đang mở',txt:`Sắp kết thúc khóa. Tái tục nâng CLV từ <strong>${fmtM(fee)}</strong> lên <strong>${fmtM(fee+4200000)}+</strong>${nr?' → đạt hạng <strong>'+nr.label+'</strong>':''}.  Thời điểm vàng để upsell.`,tag:'Cơ hội tốt'});
  if(!hv.jlpt_da_thi||hv.jlpt_da_thi==='Chưa từng thi') ins.push({icon:'🎯',pr:'low',lb:'Chưa có kinh nghiệm thi JLPT',txt:`HV chưa từng thi — yếu tâm lý khi đến kỳ thi. GV cần chuẩn bị chiến lược + thi thử định kỳ. HV đỗ JLPT → tái tục tăng <strong>2.3x</strong>.`,tag:'Chiến lược dài hạn'});
  if((hv.muc_tieu||'').includes('2026')) ins.push({icon:'✈️',pr:'low',lb:'Deadline sang Nhật 2026',txt:`Cần đạt N3+ trong <strong>${Math.ceil((new Date('2026-09-01')-new Date())/86400000/30)} tháng</strong>. R&D thiết kế lộ trình tập trung JLPT cho HV này.`,tag:'Theo dõi lộ trình'});
  return ins.slice(0,5);
}

function render(hv){
  const rank=getRank(hv.tong_hoc_phi||0),nr=nextRank(rank),need=nr?nr.min-(hv.tong_hoc_phi||0):0;
  const attC=(hv.chuyen_can||0)>=80?'#5DCAA5':(hv.chuyen_can||0)>=65?'#D4AF37':'#ff8888';
  const scC=(hv.diem_tb||0)>=7?'#5DCAA5':(hv.diem_tb||0)>=6?'#D4AF37':'#ff8888';
  const dlC=['D9','D10'].includes(hv.d_level)?'#5DCAA5':['D7','D8'].includes(hv.d_level)?'#D4AF37':'#aaa';
  document.getElementById('tid').textContent=hv.customer_id||'HV-?????';

  const careH=(hv.care_logs||[]).length>0?hv.care_logs.map(c=>{
    const dc=c.phan_ung==='Tích cực'?'#1D9E75':c.phan_ung==='Chưa xử lý'?'#C8102E':'#BA7517';
    const ts=c.phan_ung==='Tích cực'?'background:#E1F5EE;color:#085041':c.phan_ung==='Chưa xử lý'?'background:#fff0f0;color:#C8102E':'background:#FAEEDA;color:#633806';
    return `<div class="ci"><div class="cdot" style="background:${dc}"></div><div class="cb"><div class="cn">${c.van_de||'—'}</div><div class="cm">${c.ngay_cham||''} · ${c.hinh_thuc||''} · CS: ${c.nguoi_cham||''}</div></div><div class="ctag" style="${ts}">${c.phan_ung||'—'}</div></div>`;
  }).join(''):'<div style="padding:0 16px 12px;font-size:12px;color:#aaa">Chưa có lịch sử chăm sóc</div>';

  <div class="hero">
    <div class="hrow">

    </div>
    <div class="sec">

function switchTab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('p-'+id)?.classList.add('active');
  btn.classList.add('active');
}

function toggleDrill(btn){
  const arrow=btn.querySelector('.darr'),drawer=btn.nextElementSibling,open=drawer.classList.toggle('open');
  arrow.classList.toggle('open',open);
  btn.querySelector('.dtxt').textContent=open?'Thu gọn':'Xem chi tiết đầy đủ';
  if(open)setTimeout(()=>btn.scrollIntoView({behavior:'smooth',block:'start'}),100);
}

function demoData(id){
  return{customer_id:id||'HV-00145',ho_ten:'Phạm Minh Hiếu',ten_lop:'N3 K352',ten_gv:'Nguyễn Thị Ngọc Hạnh',buoi_da_hoc:18,tong_buoi:32,d_level:'D8',d_level_vao:'D4',tinh_trang_hoc:'Cần chú ý',rank_score:52,chuyen_can:62,diem_tb:5.2,hoan_thanh_bt:55,nps_gv:3.8,tong_hoc_phi:8400000,tong_khoa_hoc:2,sale_phu_trach:'Nguyễn Thị Lan',nguon_lead:'Facebook Ads',toc_do_chot:'5 ngày',ngay_convert:'15/01/26',care_alert:'Vắng 3 buổi liên tiếp · Chưa báo lý do · Sale Lan cần follow ngay',nang_luc:'Nắm chắc BCC',ky_nang_yeu:'Kanji',xep_loai:'Trung bình',jlpt_da_thi:'Chưa từng thi',nganh_nghe:'IT Engineer',loai_visa:'Kỹ sư',muc_tieu:'Sang Nhật 2026',nguyen_vong:'Lên N2',sang_nhat:'Có dự định',tuoi:26,diem_bt_t1:'7.5/10',diem_bt_t2:'5.2/10',cc_t1:88,cc_t2:62,danh_gia_chung:'Đang sa sút T2',ket_qua_jlpt:'Chưa thi',care_logs:[{van_de:'Vắng 3 buổi liên tiếp, chưa báo lý do',ngay_cham:'15/03/26',hinh_thuc:'Zalo',nguoi_cham:'Lan Anh',phan_ung:'Chưa xử lý'},{van_de:'Điểm bài T2 thấp, hỗ trợ thêm Kanji',ngay_cham:'10/03/26',hinh_thuc:'Gọi điện',nguoi_cham:'GV Ngọc Hạnh',phan_ung:'Đang theo'},{van_de:'HV phản hồi tích cực',ngay_cham:'01/03/26',hinh_thuc:'Zalo',nguoi_cham:'Lan Anh',phan_ung:'Tích cực'}]};
}

async function init(){
  const p=new URLSearchParams(location.search),id=p.get('id')||p.get('customer_id');
  try{
    let hv;
    if(!id||SCRIPT_URL.includes('YOUR_SCRIPT')){await new Promise(r=>setTimeout(r,700));hv=demoData(id);}
    else{const res=await fetch(`${SCRIPT_URL}?action=getCustomer&id=${encodeURIComponent(id)}`);hv=await res.json();if(hv.error)throw new Error(hv.error);}
    render(hv);
  }catch(e){document.getElementById('root').innerHTML=`<div class="errbox"><h3>Không tải được dữ liệu</h3><p>ID: ${id||'?'}<br>Lỗi: ${e.message}</p></div>`;}
  finally{document.getElementById('loading').style.opacity='0';setTimeout(()=>{document.getElementById('loading').style.display='none';document.getElementById('app').classList.add('ready');},400);}
}
init();
</script>
