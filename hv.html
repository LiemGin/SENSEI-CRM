<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sensei CRM — Hồ sơ học viên</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap');

  :root {
    --red: #C8102E;
    --red-deep: #9e0b22;
    --red-light: #fff0f3;
    --red-subtle: rgba(200,16,46,0.08);
    --gold: #D4AF37;
    --gold-light: rgba(212,175,55,0.15);
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --amber: #BA7517;
    --dark: #0f0505;
    --dark2: #1a0808;
    --dark3: #230c0c;
    --gray-bg: #f7f7f7;
    --gray-line: #efefef;
    --text: #1a1a1a;
    --text-2: #666;
    --text-3: #aaa;
    --font: 'Be Vietnam Pro', sans-serif;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    min-height: 100vh;
    background: var(--dark);
    font-family: var(--font);
    font-size: 14px;
    color: var(--text);
    overscroll-behavior: none;
  }

  /* ── LOADING ── */
  #loading {
    position: fixed; inset: 0;
    background: var(--dark);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 999; gap: 16px;
    transition: opacity 0.4s;
  }
  .loader-logo {
    width: 52px; height: 52px; border-radius: 50%;
    background: white; display: flex; align-items: center; justify-content: center;
    animation: pulse-logo 1.5s ease-in-out infinite;
  }
  .loader-dot { width: 30px; height: 30px; border-radius: 50%; background: var(--red); }
  .loader-txt { font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 0.05em; }
  @keyframes pulse-logo { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

  /* ── APP WRAPPER ── */
  #app {
    max-width: 430px; margin: 0 auto;
    min-height: 100vh;
    background: #fff;
    display: flex; flex-direction: column;
    opacity: 0; transition: opacity 0.3s;
  }
  #app.ready { opacity: 1; }

  /* ── TOPBAR ── */
  .topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    background: var(--red);
    position: sticky; top: 0; z-index: 10;
  }
  .back-btn {
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: white; cursor: pointer;
    flex-shrink: 0; border: none;
    transition: background 0.2s;
  }
  .back-btn:active { background: rgba(255,255,255,0.3); }
  .brand { display: flex; align-items: center; gap: 8px; flex: 1; }
  .brand-circle {
    width: 26px; height: 26px; border-radius: 50%;
    background: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .brand-circle-in { width: 15px; height: 15px; border-radius: 50%; background: var(--red); }
  .brand-name { font-size: 13px; font-weight: 600; color: white; letter-spacing: 0.01em; }
  .hv-id { font-size: 11px; color: rgba(255,255,255,0.6); margin-left: auto; }

  /* ── HERO ── */
  .hero {
    padding: 16px;
    background: linear-gradient(180deg, var(--dark2) 0%, var(--dark3) 100%);
  }
  .hero-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .avatar {
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--red); display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 700; color: white; flex-shrink: 0;
    border: 2.5px solid rgba(200,16,46,0.5);
    position: relative;
  }
  .avatar-ring {
    position: absolute; inset: -4px; border-radius: 50%;
    border: 1px solid rgba(200,16,46,0.25);
  }
  .hero-name { font-size: 17px; font-weight: 700; color: white; }
  .hero-sub { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 3px; line-height: 1.5; }
  .hero-badges { display: flex; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
  .badge {
    font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 99px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .badge-warn { background: rgba(200,16,46,0.22); color: #ff8a8a; border: 0.5px solid rgba(200,16,46,0.4); }
  .badge-ok { background: rgba(29,158,117,0.2); color: #5DCAA5; border: 0.5px solid rgba(29,158,117,0.4); }
  .badge-silver { background: rgba(180,180,180,0.12); color: #ccc; border: 0.5px solid rgba(200,200,200,0.3); }
  .badge-gold { background: rgba(212,175,55,0.18); color: var(--gold); border: 0.5px solid rgba(212,175,55,0.4); }
  .badge-diamond { background: rgba(127,119,221,0.2); color: #AFA9EC; border: 0.5px solid rgba(127,119,221,0.4); }
  .badge-bronze { background: rgba(205,127,50,0.2); color: #cd7f32; border: 0.5px solid rgba(205,127,50,0.4); }

  .hero-meta {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  }
  .mm {
    background: rgba(255,255,255,0.06); border-radius: 8px;
    padding: 8px 10px; border: 0.5px solid rgba(255,255,255,0.05);
  }
  .mm-label { font-size: 10px; color: rgba(255,255,255,0.3); margin-bottom: 3px; }
  .mm-val { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.9); }
  .mm-val.gold { color: var(--gold); }
  .mm-val.green { color: #5DCAA5; }
  .mm-val.red { color: #ff8a8a; }

  /* ── KPI ROW ── */
  .kpi-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    background: #0f0505;
    border-bottom: 1px solid rgba(200,16,46,0.12);
  }
  .ki {
    padding: 12px 6px; text-align: center;
    border-right: 0.5px solid rgba(255,255,255,0.04);
  }
  .ki:last-child { border-right: none; }
  .kv { font-size: 20px; font-weight: 700; }
  .kl { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 2px; }

  /* ── ALERT BAR ── */
  .alert-bar {
    margin: 10px 14px;
    padding: 9px 13px;
    background: var(--red-subtle);
    border-radius: var(--radius-sm);
    border: 0.5px solid rgba(200,16,46,0.25);
    display: flex; gap: 9px; align-items: flex-start;
  }
  .alert-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--red); flex-shrink: 0; margin-top: 3px;
    animation: blink 1.8s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .alert-text { font-size: 12px; color: var(--red); line-height: 1.5; font-weight: 500; }

  /* ── TABS ── */
  .tab-wrap {
    display: flex; gap: 5px;
    padding: 10px 14px;
    background: var(--gray-bg);
    border-bottom: 1px solid var(--gray-line);
    position: sticky; top: 50px; z-index: 9;
  }
  .tab-btn {
    flex: 1; padding: 7px 4px;
    border-radius: 7px; font-size: 11px; font-weight: 600;
    text-align: center; cursor: pointer; border: none;
    color: var(--text-3); background: transparent;
    font-family: var(--font);
    transition: all 0.2s;
  }
  .tab-btn.active { background: var(--red); color: white; }

  /* ── SECTIONS ── */
  .section { border-top: 1px solid var(--gray-line); }
  .sec-head {
    padding: 12px 16px 6px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .sec-title { font-size: 10px; font-weight: 700; color: var(--text-3); letter-spacing: 0.07em; }
  .sec-action { font-size: 12px; color: var(--red); cursor: pointer; font-weight: 600; }

  /* ── BARS ── */
  .bars { padding: 4px 16px 12px; display: flex; flex-direction: column; gap: 9px; }
  .bar-row { display: flex; align-items: center; gap: 9px; }
  .bar-label { font-size: 12px; color: var(--text-2); min-width: 100px; }
  .bar-track {
    flex: 1; height: 5px; background: #f0f0f0;
    border-radius: 99px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; border-radius: 99px;
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
  }
  .bar-pct { font-size: 12px; font-weight: 600; min-width: 38px; text-align: right; }

  /* ── INFO GRID ── */
  .info-grid { padding: 4px 16px 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .info-item {
    background: var(--gray-bg); border: 0.5px solid var(--gray-line);
    border-radius: var(--radius-sm); padding: 9px 11px;
  }
  .info-label { font-size: 10px; color: var(--text-3); margin-bottom: 3px; }
  .info-val { font-size: 12px; font-weight: 600; color: var(--text); }
  .info-val.red { color: var(--red); }
  .info-val.gold { color: #9a7a00; }
  .info-val.green { color: var(--green); }
  .info-val.amber { color: var(--amber); }

  /* ── CARE LIST ── */
  .care-list { padding: 4px 16px 12px; }
  .care-item {
    display: flex; gap: 9px; align-items: flex-start;
    padding: 10px 0; border-bottom: 0.5px solid var(--gray-line);
  }
  .care-item:last-child { border-bottom: none; }
  .care-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .care-body { flex: 1; }
  .care-note { font-size: 12px; color: var(--text); line-height: 1.5; }
  .care-meta { font-size: 10px; color: var(--text-3); margin-top: 3px; }
  .care-tag {
    font-size: 10px; font-weight: 600; padding: 2px 9px; border-radius: 99px;
    flex-shrink: 0; white-space: nowrap; margin-top: 2px;
  }

  /* ── SALE CARD ── */
  .sale-card {
    margin: 4px 16px 14px;
    background: var(--gray-bg); border: 0.5px solid var(--gray-line);
    border-radius: var(--radius); overflow: hidden;
  }
  .sale-header {
    padding: 11px 13px; background: var(--red-light);
    border-bottom: 0.5px solid rgba(200,16,46,0.1);
    display: flex; align-items: center; gap: 10px;
  }
  .sale-av {
    width: 36px; height: 36px; border-radius: 50%; background: var(--red);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .sale-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .sale-role { font-size: 10px; color: var(--red); margin-top: 2px; font-weight: 500; }
  .sale-kpi { margin-left: auto; text-align: right; }
  .sale-kpi-v { font-size: 13px; font-weight: 700; color: var(--text); }
  .sale-kpi-l { font-size: 10px; color: var(--text-3); }
  .sale-stats {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    padding: 11px 13px; gap: 6px;
  }
  .sale-stat { text-align: center; }
  .sale-stat-v { font-size: 14px; font-weight: 700; color: var(--text); }
  .sale-stat-l { font-size: 10px; color: var(--text-3); margin-top: 2px; }

  /* ── TIMELINE ── */
  .timeline { padding: 0 13px 11px; display: flex; align-items: center; }
  .tl-it { flex: 1; text-align: center; }
  .tl-d { width: 9px; height: 9px; border-radius: 50%; margin: 0 auto 4px; transition: transform 0.2s; }
  .tl-d.done { background: var(--red); }
  .tl-d.now { background: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,0.2); }
  .tl-d.todo { background: #ddd; }
  .tl-ln { flex: 1; height: 1.5px; background: #e8e8e8; align-self: center; position: relative; top: -6px; }
  .tl-ln.done { background: var(--red); }
  .tl-lbl { font-size: 9px; color: var(--text-3); line-height: 1.4; }
  .tl-lbl.done { color: var(--red); font-weight: 600; }
  .tl-lbl.now { color: #9a7a00; font-weight: 600; }

  /* ── RANK TABLE ── */
  .rank-table {
    margin: 4px 16px 8px;
    border: 0.5px solid var(--gray-line); border-radius: var(--radius); overflow: hidden;
  }
  .rt-row {
    display: grid; grid-template-columns: 26px 1fr 65px 1fr;
    align-items: center; padding: 9px 12px;
    border-bottom: 0.5px solid var(--gray-line); font-size: 12px;
    transition: background 0.15s;
  }
  .rt-row:last-child { border-bottom: none; }
  .rt-row.hdr { background: var(--gray-bg); font-size: 10px; color: var(--text-3); font-weight: 700; }
  .rt-row.current { background: var(--red-light); border-left: 3px solid var(--red); }
  .rt-icon { font-size: 14px; text-align: center; }
  .rt-name { font-weight: 600; color: var(--text); line-height: 1.4; }
  .rt-name small { display: block; font-size: 10px; color: var(--text-3); font-weight: 400; }
  .rt-row.current .rt-name { color: var(--red); }
  .rt-money { font-size: 11px; color: var(--text-2); }
  .rt-perks { display: flex; gap: 3px; flex-wrap: wrap; }
  .pk {
    font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 99px;
    background: #f0f0f0; color: var(--text-2);
  }
  .rt-row.current .pk { background: rgba(200,16,46,0.1); color: var(--red); }

  /* ── UPSELL BOX ── */
  .upsell-box {
    margin: 0 16px 14px; padding: 12px 14px;
    background: var(--red-light); border: 0.5px solid rgba(200,16,46,0.2);
    border-radius: var(--radius-sm);
  }
  .upsell-title { font-size: 12px; font-weight: 700; color: var(--red); margin-bottom: 6px; }
  .upsell-txt { font-size: 12px; color: var(--text-2); line-height: 1.6; }
  .upsell-txt strong { color: var(--red); font-weight: 700; }

  /* ── STRIP COMPONENTS ── */
  .strip {
    margin: 4px 14px 8px;
    border-radius: var(--radius-sm); overflow: hidden;
    border: 0.5px solid var(--gray-line); cursor: pointer;
    transition: border-color 0.2s;
  }
  .strip:active { border-color: rgba(200,16,46,0.4); }
  .strip-inner {
    padding: 10px 13px;
    display: flex; align-items: center; gap: 10px;
  }
  .strip-sale { background: var(--red-light); }
  .strip-rank { background: linear-gradient(135deg, var(--dark2), var(--dark3)); }

  /* ── DETAIL TOGGLE BUTTON ── */
  .detail-toggle {
    margin: 6px 14px 10px;
    padding: 11px 14px;
    background: var(--red-light); border: 0.5px solid rgba(200,16,46,0.22);
    border-radius: var(--radius-sm); cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    transition: background 0.2s;
  }
  .detail-toggle:hover { background: #ffe5e9; }
  .detail-toggle-txt { font-size: 13px; font-weight: 600; color: var(--red); }
  .detail-toggle-arrow {
    font-size: 18px; color: var(--red);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  }
  .detail-toggle-arrow.open { transform: rotate(90deg); }

  /* ── DRAWER ── */
  .drawer {
    max-height: 0; overflow: hidden;
    transition: max-height 0.45s cubic-bezier(.4,0,.2,1);
    background: var(--gray-bg);
    border-top: 0 solid var(--gray-line);
  }
  .drawer.open {
    max-height: 1800px;
    border-top: 1px solid var(--gray-line);
  }
  .drawer-inner { padding: 4px 0 8px; }

  /* ── ACTIONS ── */
  .actions { padding: 12px 14px 14px; display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 11px 6px;
    border-radius: var(--radius-sm); font-size: 13px; font-weight: 700;
    text-align: center; cursor: pointer; border: none; font-family: var(--font);
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { opacity: 0.85; transform: scale(0.98); }
  .btn-red { background: var(--red); color: white; }
  .btn-outline { background: white; color: var(--red); border: 1.5px solid var(--red); }
  .btn-gray { background: var(--gray-bg); color: var(--text-2); border: 0.5px solid var(--gray-line); }

  /* ── FOOTER ── */
  .footer {
    padding: 10px 16px; background: var(--gray-bg);
    border-top: 1px solid var(--gray-line);
    display: flex; align-items: center; gap: 7px;
  }
  .footer-circle {
    width: 18px; height: 18px; border-radius: 50%; background: var(--red);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .footer-in { width: 10px; height: 10px; border-radius: 50%; background: white; }
  .footer-txt { font-size: 11px; color: var(--text-3); }
  .footer-txt span { color: var(--red); font-weight: 600; }

  /* ── ERROR ── */
  .error-box {
    margin: 40px 20px; padding: 20px;
    background: var(--red-light); border: 1px solid rgba(200,16,46,0.3);
    border-radius: var(--radius); text-align: center;
  }
  .error-box h3 { color: var(--red); margin-bottom: 8px; }
  .error-box p { font-size: 13px; color: var(--text-2); line-height: 1.6; }

  /* ── PANEL VISIBILITY ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── SKELETON ── */
  .skel {
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 200% 100%;
    animation: skel 1.4s infinite;
    border-radius: 4px;
  }
  @keyframes skel { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-logo"><div class="loader-dot"></div></div>
  <div class="loader-txt">SENSEI NIHONGO · CRM</div>
</div>

<div id="app">

  <div class="topbar">
    <button class="back-btn" onclick="history.back()">&#8592;</button>
    <div class="brand">
      <div class="brand-circle"><div class="brand-circle-in"></div></div>
      <div class="brand-name">Sensei Nihongo</div>
    </div>
    <div class="hv-id" id="hv-id-top">HV-?????</div>
  </div>

  <div id="main-content">
    <!-- Render by JS -->
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG — Thay SCRIPT_URL bằng Apps Script Web App URL
// ═══════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxPHNBVoQDBO7EDkrdf15sf-1yHom_ujefvleifk2zyezRBuzQ_ZG78Xc63F5RAsPhZ/exec';

// Rule xếp hạng học viên — admin có thể chỉnh tại đây
const RANK_RULES = [
  { key: 'diamond', icon: '✦', label: 'Diamond', sub: 'Thượng khách',   min: 20000000, pct: 20, perks: ['GV riêng', 'Lớp VIP', '-20%'] },
  { key: 'gold',    icon: '◆', label: 'Gold',    sub: 'Học viên vàng',  min: 12000000, pct: 15, perks: ['Ưu tiên lớp', '-15%'] },
  { key: 'silver',  icon: '◈', label: 'Silver',  sub: 'Học viên thân',  min:  8000000, pct: 10, perks: ['CS ưu tiên', '-10%'] },
  { key: 'bronze',  icon: '○', label: 'Bronze',  sub: 'Học viên mới',   min:  4000000, pct:  5, perks: ['CS cơ bản'] },
  { key: 'new',     icon: '·', label: 'New',     sub: 'Mới đăng ký',    min:         0, pct:  0, perks: ['Onboard'] },
];

function getRank(totalFee) {
  for (const r of RANK_RULES) { if (totalFee >= r.min) return r; }
  return RANK_RULES[RANK_RULES.length - 1];
}

function getNextRank(current) {
  const idx = RANK_RULES.findIndex(r => r.key === current.key);
  return idx > 0 ? RANK_RULES[idx - 1] : null;
}

function fmtMoney(n) {
  if (!n) return '0đ';
  return Number(n).toLocaleString('vi-VN') + 'đ';
}

function fmtPct(n) { return Math.round(n) + '%'; }

function getInitials(name) {
  if (!name) return 'HV';
  const parts = name.trim().split(' ');
  return parts.length >= 2
    ? (parts[parts.length - 2][0] + parts[parts.length - 1][0]).toUpperCase()
    : name.slice(0, 2).toUpperCase();
}

function badgeClass(rank) {
  const map = { diamond:'badge-diamond', gold:'badge-gold', silver:'badge-silver', bronze:'badge-bronze', new:'' };
  return map[rank.key] || '';
}

// ═══════════════════════════════════════════════════════
// FETCH DATA
// ═══════════════════════════════════════════════════════
async function fetchHV(customerId) {
  const url = `${SCRIPT_URL}?action=getCustomer&id=${encodeURIComponent(customerId)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Network error');
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render(hv) {
  const rank = getRank(hv.tong_hoc_phi || 0);
  const nextRank = getNextRank(rank);
  const needMore = nextRank ? nextRank.min - (hv.tong_hoc_phi || 0) : 0;
  const initials = getInitials(hv.ho_ten);

  // KPI colors

// ═══════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id)?.classList.add('active');
  btn.classList.add('active');
}

// ═══════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════
function handleUpsell(id, sale) {
  alert(`Mở form Upsell D10\nHV: ${id}\nSale: ${sale}\n\n→ Kết nối Glide action hoặc Google Form`);
}
function handleCS(id) {
  alert(`Mở form Ghi nhận chăm sóc\nHV: ${id}\n\n→ Kết nối Glide action hoặc Google Form`);
}
function handleClass(tenLop) {
  alert(`Xem lớp: ${tenLop}\n\n→ Drill-down sang màn hình Lớp học`);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
async function init() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id') || params.get('customer_id');

  try {
    let hv;
    if (SCRIPT_URL.includes('YOUR_SCRIPT_ID') || !id) {
      // Demo mode
      await new Promise(r => setTimeout(r, 800));
      hv = getDemoData(id);
    } else {
      hv = await fetchHV(id);
    }
    render(hv);
  } catch (err) {
    document.getElementById('main-content').innerHTML = `
      <div class="error-box">
        <h3>Không tải được dữ liệu</h3>
        <p>ID: ${id || 'không có'}<br>Lỗi: ${err.message}<br><br>
        Kiểm tra lại SCRIPT_URL và quyền truy cập Apps Script.</p>
      </div>`;
  } finally {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').classList.add('ready');
    }, 400);
  }
}

init();
</script>
